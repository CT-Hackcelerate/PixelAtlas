template_id: ct-image
iod_name: CT Image IOD
modality: CT
body_part: ""       # generic IOD-level template — not tied to one body part
orientation: ""      # generic IOD-level template — not tied to one orientation
sop_class_uid: 1.2.840.10008.5.1.4.1.1.2   # CT Image Storage
has_seed_data: true                         # synthetic fallback .dcm, see scripts/generate_seed.py
seed_params:
  include_frame_of_reference: true          # CT Image IOD requires a Frame of Reference module
tag_rules:
  fixed:
    Manufacturer: "Pixel Atlas Synthetic"
    BodyPartExamined: CHEST
    PatientBirthDate: ""
    PatientSex: "O"
    StudyDate: "20260101"
    StudyTime: "000000"
    StudyID: "1"
    AccessionNumber: "SEED0001"
    ReferringPhysicianName: ""
    SeriesNumber: "1"
    AcquisitionNumber: "1"
    ImageType: ["ORIGINAL", "PRIMARY", "AXIAL"]
    PatientPosition: "HFS"
    PositionReferenceIndicator: ""
    SliceThickness: "1.5"
    KVP: "120"
    ImageOrientationPatient: ["1", "0", "0", "0", "1", "0"]
    PixelSpacing: ["0.7", "0.7"]
    RescaleIntercept: "-1024"
    RescaleSlope: "1"
  sequence:
    InstanceNumber: "i + 1"
    SliceLocation: "start=-120.0, step=1.5"
    ImagePositionPatient: "derive_from(SliceLocation)"
  randomized:
    PatientName: synthetic_name_pool
    PatientID: generate_synthetic_id
