template_id: mg-image
iod_name: Digital Mammography X-Ray Image IOD (For Presentation)
modality: MG
body_part: ""       # generic IOD-level template — not tied to one body part
orientation: ""      # generic IOD-level template — not tied to one orientation
sop_class_uid: 1.2.840.10008.5.1.4.1.1.1.2   # Digital Mammography X-Ray Image Storage - For Presentation
has_seed_data: true                           # synthetic fallback .dcm, see scripts/generate_seed.py
seed_params:
  # Frame of Reference is technically conditional for this IOD ("required if
  # multiple images are obtained without releasing breast compression"), but
  # dicom-validator's own IOD conformance check expects it present regardless
  # — included here, same as CT/MR, rather than fight that check.
  include_frame_of_reference: true
tag_rules:
  fixed:
    Manufacturer: "Pixel Atlas Synthetic"
    BodyPartExamined: BREAST
    PatientBirthDate: ""
    PatientSex: "F"
    StudyDate: "20260101"
    StudyTime: "000000"
    StudyID: "1"
    AccessionNumber: "SEED0001"
    ReferringPhysicianName: ""
    SeriesNumber: "1"
    ImageType: ["ORIGINAL", "PRIMARY"]
    PatientOrientation: ["A", "FL"]
    ManufacturerModelName: "Pixel Atlas Synthetic Mammo"
    DeviceSerialNumber: "SEED-DEVICE-0001"
    SoftwareVersions: "1.0"
    DateOfLastCalibration: "20260101"
    TimeOfLastCalibration: "000000"
    PositionReferenceIndicator: ""
    AcquisitionContextSequence: []
    # DX Series module
    PresentationIntentType: "FOR PRESENTATION"
    # DX Anatomy Imaged module
    ImageLaterality: "R"
    AnatomicRegionSequence:
      - CodeValue: "T-04000"
        CodingSchemeDesignator: "SRT"
        CodeMeaning: "Breast"
    # DX Positioning module (Mammography variant uses View Code Sequence)
    PatientPosition: "HFS"
    ViewPosition: "CC"
    PositionerType: "NONE"
    OrganExposed: "BREAST"
    ViewCodeSequence:
      - CodeValue: "R-10242"
        CodingSchemeDesignator: "SRT"
        CodeMeaning: "cranio-caudal"
        ViewModifierCodeSequence: []
    # DX Detector module
    DetectorType: "DIRECT"
    DetectorConfiguration: "AREA"
    DetectorID: "SEED-DET-0001"
    DetectorBinning: ["1", "1"]
    DetectorActiveShape: "RECTANGLE"
    DetectorActiveDimensions: ["230.0", "280.0"]
    DetectorActiveOrigin: ["0.0", "0.0"]
    DetectorElementPhysicalSize: ["0.1", "0.1"]
    DetectorElementSpacing: ["0.1", "0.1"]
    FieldOfViewShape: "RECTANGLE"
    FieldOfViewOrigin: ["0.0", "0.0"]
    FieldOfViewRotation: "0"
    FieldOfViewHorizontalFlip: "NO"
    # X-ray generation/filtration
    KVP: "28"
    ExposureTime: "500"
    XRayTubeCurrent: "100"
    Exposure: "50"
    FilterType: "MOLYBDENUM"
    FocalSpots: "0.3"
    AnodeTargetMaterial: "MOLYBDENUM"
    BodyPartThickness: "45"
    CompressionForce: "80"
    EstimatedRadiographicMagnificationFactor: "1.0"
    # DX Image module
    BurnedInAnnotation: "NO"
    PixelIntensityRelationship: "LOG"
    PixelIntensityRelationshipSign: 1
    PresentationLUTShape: "IDENTITY"
    LossyImageCompression: "00"
    RelativeXRayExposure: "100"
    WindowCenter: "2048"
    WindowWidth: "4096"
    RescaleIntercept: "0"
    RescaleSlope: "1"
    RescaleType: "US"
    ImagerPixelSpacing: ["0.1", "0.1"]
    PixelSpacing: ["0.1", "0.1"]
  sequence:
    InstanceNumber: "i + 1"
  randomized:
    PatientName: synthetic_name_pool
    PatientID: generate_synthetic_id
